<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python">
    <meta name="description" content="World best web development tutorials">
    <meta name="navi" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate</title>
    <link rel="stylesheet" href="asset/lib/normalize.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="calculator">
        <div id="display" class="display">0</div>

        <div class="buttons">

            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('/')">/</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>    
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('*')">*</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>

            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendNumber('0')">0</button>
            <button class="equal" onclick="calculate()">=</button>
        
        </div>
    </div>

    <script src="js/calculator.js"></script>
    <script>
        const calculator = new Calculator();
        let displayValue = '0';

        function isOperator(token){
            return token === '+' || token === '-' || token === '*' || token === '/' || token === '%';
        }

        function runOperation(left , operator , right){
            if(operator === '+') return left + right;
            if(operator === '-') return left - right;
            if(operator === '*') return left * right;
            if(operator === '/') return left / right;
            if(operator === '%') return left % right;
            throw new Error('Invalid operator');
        }
            

        function updateDisplay(){
            document.getElementById('display').textContent = displayValue;
        }

        function appendNumber(number){
            if(displayValue === '0' && number !== '.'){
                displayValue = number;
            }else if(number === '.'){
                const parts = displayValue.split(' ');
                const currentPart = parts[parts.length - 1];
                if(currentPart.includes('.')) return;
                 displayValue += number;
            }else{
                displayValue += number;
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (displayValue === '0') return;

            const parts = displayValue.trim().split(' ');
            const lastPart = parts[parts.length - 1];

            if (isOperator(lastPart)) {
                parts[parts.length - 1] = op;
                displayValue = parts.join(' ');
            } else {
                displayValue += ' ' + op + ' ';
            }
            updateDisplay();
        }

        function calculate(){
            try{
                const tokens = displayValue.trim().split(' ').filter(Boolean);
                if(tokens.length < 3) return;

                let result = parseFloat(tokens[0]);
                if(Number.isNaN(result)) throw new Error('Invalid Number');

                for(let i = 1; i <tokens.length; i+=2){
                    const operator = tokens[i];
                    const next = parseFloat(tokens[i+1]);

                    if(!isOperator(operator) || Number.isNaN(next)){
                        throw new Error('Invalid Expression');
                    }

                    result = runOperation(result , operator , next);
                }
                displayValue = result.toString();
                updateDisplay();
            }catch(error){
                displayValue = 'Error';
                updateDisplay();
            }
        }

        function clearDisplay(){
            displayValue = '0';
            updateDisplay();
        }


    </script>
        
</body>
</html>
